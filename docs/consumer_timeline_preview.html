<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consumer Timeline</title>
  <style>
    :root {
      --bg-a: #f8f4ec;
      --bg-b: #ece2d4;
      --card: rgba(255, 251, 245, 0.92);
      --card-strong: #fffdf9;
      --ink: #1d2830;
      --muted: #68747d;
      --line: rgba(23, 37, 44, 0.12);
      --teal: #0f6a70;
      --amber: #9d6b17;
      --red: #b24a34;
      --green: #2f714e;
      --shadow: 0 24px 70px rgba(23, 30, 26, 0.12);
      --radius-xl: 30px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --mono: Consolas, monospace;
      --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; min-width: 0; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: var(--ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 106, 112, 0.15), transparent 30%),
        radial-gradient(circle at top right, rgba(178, 74, 52, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(29, 40, 48, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29, 40, 48, 0.028) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 95%);
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1560px;
      margin: 0 auto;
      padding: 26px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 26px;
      align-items: start;
    }

    .rail {
      position: sticky;
      top: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-self: start;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card, .hero, .event-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .card { border-radius: var(--radius-xl); padding: 20px; }

    .hero {
      border-radius: 34px;
      padding: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
      gap: 20px;
    }

    .eyebrow,
    .section-title,
    .k-label,
    .meta-label,
    .prop-key {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .eyebrow { color: var(--teal); font-weight: 700; margin-bottom: 12px; }

    .headline {
      margin: 0 0 14px;
      font-size: clamp(1.4rem, 2vw, 2.2rem);
      font-weight: 900;
      line-height: 1.1;
    }

    .chip-row { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 10px; }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      font-size: 0.83rem;
    }

    .chip strong, .mono {
      font-family: var(--mono);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .hero-kpis, .stats-grid, .meta-grid, .duo-grid, .summary-grid {
      display: grid;
      gap: 12px;
    }

    .hero-kpis, .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .kpi, .stat, .meta-item, .mini-panel {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 18px;
    }

    .kpi {
      min-height: 98px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .k-value {
      font-family: var(--serif);
      font-size: 2rem;
      line-height: 1;
      margin: 8px 0;
    }

    .stat { padding: 14px; }

    .stat strong { display: block; font-size: 1.32rem; margin-bottom: 4px; }

    .heat-stack { display: grid; gap: 10px; }

    .heat-row {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 16px;
      padding: 12px;
    }

    .heat-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }

    .bar { height: 8px; border-radius: 999px; background: rgba(23, 37, 44, 0.08); overflow: hidden; }

    .fill { height: 100%; background: linear-gradient(90deg, #d69229, #b24a34); }

    .timeline { display: flex; flex-direction: column; gap: 18px; }

    .event-card {
      border-radius: 30px;
      padding: 22px;
      position: relative;
      /* overflow: hidden removed — it was clipping child scroll containers (table-wrap) */
    }

    .event-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 7px;
      background: var(--accent, var(--teal));
      border-radius: 30px 0 0 30px; /* replaces overflow:hidden for rounding the stripe corners */
    }

    .event-head {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr) auto 22px;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
      cursor: pointer;
      user-select: none;
    }

    .event-mark {
      width: 68px;
      height: 68px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(160deg, var(--accent, var(--teal)), rgba(22, 29, 35, 0.96));
    }

    .event-title {
      margin: 0 0 8px;
      font-size: 1.3rem;
      font-weight: 900;
      line-height: 1.1;
    }

    /* Compact property row — replaces narrative subtitle */
    .prop-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 6px;
    }

    .prop {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
    }

    .prop-val {
      font-size: 0.85rem;
      font-family: var(--mono);
      color: var(--ink);
    }

    .badge-stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 9px 14px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.79rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.fail  { background: rgba(178, 74, 52, 0.13);  color: var(--red);   }
    .badge.warn  { background: rgba(157, 107, 23, 0.14); color: var(--amber); }
    .badge.good  { background: rgba(47, 113, 78, 0.14);  color: var(--green); }
    .badge.info  { background: rgba(15, 106, 112, 0.12); color: var(--teal);  }

    .meta-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 18px; }

    .meta-item { padding: 14px 16px; }

    .meta-value { margin-top: 6px; line-height: 1.55; }

    .duo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-bottom: 18px; }

    .section-box {
      border-radius: 22px;
      padding: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
    }

    .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 12px; }

    .mini-panel { padding: 12px 14px; }
    .mini-panel.fail { background: rgba(178,74,52,.1);   border-color: rgba(178,74,52,.22); }
    .mini-panel.warn { background: rgba(157,107,23,.09); border-color: rgba(157,107,23,.2); }
    .mini-panel.good { background: rgba(47,113,78,.09);  border-color: rgba(47,113,78,.2); }
    .mini-panel.fail .mini-value { color: var(--red);   font-weight: 700; }
    .mini-panel.warn .mini-value { color: var(--amber); font-weight: 700; }
    .mini-panel.good .mini-value { color: var(--green); font-weight: 700; }

    .mini-value { margin-top: 6px; line-height: 1.5; }

    .scroll-box {
      margin-top: 12px;
      max-height: 126px;
      overflow: auto;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(178, 74, 52, 0.16);
      background: rgba(178, 74, 52, 0.08);
      color: #8d3928;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .neutral-box {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(23, 37, 44, 0.04);
      color: var(--muted);
      font-size: 0.85rem;
    }

    .table-wrap {
      margin-top: 12px;
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card-strong);
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      padding: 12px 14px;
      background: #f6eee1;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(23, 37, 44, 0.08);
      vertical-align: top;
      line-height: 1.45;
    }

    tbody tr:last-child td { border-bottom: 0; }

    .empty {
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed rgba(23, 37, 44, 0.14);
      background: rgba(23, 37, 44, 0.04);
      color: var(--muted);
      font-size: 0.85rem;
    }

    .steps-box { margin-bottom: 18px; }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .timeline-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .timeline-label { flex: 1; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }

    .btn-toolbar {
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      font-family: var(--ui);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.15s;
    }
    .btn-toolbar:hover { background: rgba(255, 255, 255, 0.95); }

    /* ── Compact / expand ────────────────────────────────────────────────── */
    .expand-chevron {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1;
      padding-top: 5px;
      transition: transform 0.22s ease;
      align-self: start;
      text-align: center;
    }

    .event-card.collapsed .expand-chevron { transform: rotate(-90deg); }

    .event-body-wrap {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.28s ease;
    }

    .event-card.collapsed .event-body-wrap { grid-template-rows: 0fr; }

    .event-body { overflow: hidden; min-height: 0; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(23, 37, 44, 0.05); border-radius: 999px; }
    ::-webkit-scrollbar-thumb { background: rgba(23, 37, 44, 0.22); border-radius: 999px; }

    @media (max-width: 1220px) {
      .shell, .hero, .meta-grid, .duo-grid { grid-template-columns: 1fr; }
      .rail { position: static; }
      .badge-stack { align-items: flex-start; }
    }

    @media (max-width: 760px) {
      .shell { padding: 14px; gap: 16px; }
      .hero, .event-card, .card { border-radius: 22px; }
      .event-head { grid-template-columns: 1fr; }
      .event-mark { width: 58px; height: 58px; border-radius: 18px; }
      .hero-kpis, .stats-grid, .summary-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

        <div class="stats-grid" id="railStats"></div>

          <div class="eyebrow">Consumer Timeline</div>

      <div class="timeline-toolbar">

      return String(value ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function tone(status) {
      const key = (status || "").toLowerCase();
      if (key.includes("fail"))                            return "fail";
      if (key.includes("retry") || key.includes("pending")) return "warn";
      if (key.includes("confirm") || key.includes("process")) return "good";
      return "info";
    }

    function accent(kind) { return kind === "Hook" ? "#9d6b17" : "#0f6a70"; }

    function prop(key, val) {
      return `<span class="prop"><span class="prop-key">${esc(key)}</span><span class="prop-val">${esc(val)}</span></span>`;
    }

    function railIdRow(key, val) {
      return `<div><span class="prop-key" style="display:block">${esc(String(key))}</span><span class="mono" style="font-size:.82rem;overflow-wrap:anywhere">${esc(String(val))}</span></div>`;
    }

    const items = DATA.items;
    const failedCount    = items.filter(i => i.inboxStatus?.status === "Failed").length;
    const hookCount      = items.filter(i => i.kind === "Hook").length;
    const transCount     = items.filter(i => i.kind === "Transition").length;
    const totalAttempts  = items.reduce((s, i) => s + (i.inboxStatus?.attemptCount || 0), 0);
    const totalHistory   = items.reduce((s, i) => s + (i.outbox?.history?.length || 0), 0);

    // Instance header
    document.getElementById("instanceGuid").textContent = DATA.instanceGuid;
    document.getElementById("entityNote").innerHTML = [
      DATA.consumerGuid ? railIdRow("consumer", DATA.consumerGuid) : "",
      items.length > 0  ? railIdRow("entity",   items[0].entityId) : "",
      railIdRow("records", items.length)
    ].join("");

    // Hero title — just the guid, no copy paragraph
    document.getElementById("heroTitle").textContent = DATA.instanceGuid;

    // Chips
    document.getElementById("chips").innerHTML = [
      `<div class="chip">def_id <strong>${items[0].defId}</strong></div>`,
      `<div class="chip">def_version <strong>${items[0].defVersionId}</strong></div>`,
      `<div class="chip">entity <strong class="mono">${esc(items[0].entityId)}</strong></div>`
    ].join("");

    // KPIs
    document.getElementById("kpis").innerHTML = [
      kpi("records",      items.length,     `${transCount} transition · ${hookCount} hook`),
      kpi("inbox_failed", failedCount,       ""),
      kpi("attempts",     totalAttempts,     "inbox total"),
      kpi("ack_history",  totalHistory,      "outbox rows")
    ].join("");

    // Rail stats
    document.getElementById("railStats").innerHTML = [
      stat(totalAttempts, "attempts"),
      stat(totalHistory,  "history"),
      stat(hookCount,     "hooks"),
      stat(transCount,    "transitions")
    ].join("");

    // Heat
    const maxAttempts = Math.max(...items.map(i => i.inboxStatus?.attemptCount || 0), 1);
    document.getElementById("heat").innerHTML = items.map(item => {
      const attempts = item.inboxStatus?.attemptCount || 0;
      const width    = Math.max(12, Math.round((attempts / maxAttempts) * 100));
      const label    = item.kind === "Hook" ? item.route : `event_code: ${item.eventCode}`;
      return `
        <div class="heat-row">
          <div class="heat-head">
            <span class="mono" style="font-size:.76rem;color:var(--muted)">${esc(label)}</span>
            <strong>${attempts}</strong>
          </div>
          <div class="bar"><div class="fill" style="width:${width}%"></div></div>
        </div>`;
    }).join("");

    // Items
    document.getElementById("items").innerHTML = items.map(renderItem).join("");

    // Per-card toggle
    document.querySelectorAll(".event-head").forEach(head => {
      head.addEventListener("click", () => {
        head.closest(".event-card").classList.toggle("collapsed");
      });
    });

    function collapseAll() {
      document.querySelectorAll(".event-card").forEach(c => c.classList.add("collapsed"));
    }

    function expandAll() {
      document.querySelectorAll(".event-card").forEach(c => c.classList.remove("collapsed"));
    }

    // ── helpers ──────────────────────────────────────────────────────────────

    function kpi(label, value, sub) {
      return `
        <div class="kpi">
          <div class="k-label">${esc(label)}</div>
          <div class="k-value">${esc(value)}</div>
          ${sub ? `<div class="subtext" style="font-size:.8rem;color:var(--muted)">${esc(sub)}</div>` : ""}
        </div>`;
    }

    function stat(value, label) {
      return `
        <div class="stat">
          <strong>${esc(value)}</strong>
          <div style="font-size:.8rem;color:var(--muted)">${esc(label)}</div>
        </div>`;
    }

    function none() {
      return `<div class="neutral-box">—</div>`;
    }

    function renderItem(item) {
      const eventTitle = item.kind === "Hook" ? item.route : `event_code: ${item.eventCode}`;
      const history    = item.outbox?.history || [];

      const historyRows = history.map(a => `
        <tr>
          <td>${esc(a.attemptNo)}</td>
          <td>${esc(a.outcome)}</td>
          <td>${esc(a.status)}</td>
          <td>${esc(pretty(a.createdAt))}</td>
          <td>${esc(a.error || "")}</td>
        </tr>`).join("");

      return `
        <article class="event-card" style="--accent:${accent(item.kind)};">
          <div class="event-head">
            <div class="event-mark">${item.kind === "Hook" ? "H" : "T"}</div>
            <div>
              <div class="section-title">${esc(item.kind)}</div>
              <h2 class="event-title">${esc(eventTitle)}</h2>
              <div class="prop-row">
                ${prop("inbox_id",    item.inboxId)}
                ${prop("def_id",      item.defId)}
                ${prop("def_version", item.defVersionId)}
                ${prop("occurred",    pretty(item.occurred))}
                ${prop("created",     pretty(item.created))}
              </div>
            </div>
            <div class="badge-stack">
              <div class="badge ${tone(item.inboxStatus?.status)}">${esc(item.inboxStatus?.status)}</div>
              <div class="badge ${tone(item.outbox?.outcome)}">${esc(item.outbox?.outcome)} / ${esc(item.outbox?.status)}</div>
            </div>
            <div class="expand-chevron">▾</div>
          </div>

          <div class="event-body-wrap"><div class="event-body">
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label">ack_guid</div>
              <div class="meta-value mono">${esc(item.ackGuid)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">handler_version</div>
              <div class="meta-value">${esc(item.handlerVersion ?? "—")}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">run_count</div>
              <div class="meta-value">${esc(item.runCount)}</div>
            </div>
          </div>

          <div class="duo-grid">
            <section class="section-box">
              <div class="section-title">inbox_status</div>
              <div class="summary-grid">
                <div class="mini-panel ${tone(item.inboxStatus?.status)}">
                  <div class="meta-label">status</div>
                  <div class="mini-value">${esc(item.inboxStatus?.status ?? "—")}</div>
                </div>
                <div class="mini-panel">
                  <div class="meta-label">attempt_count</div>
                  <div class="mini-value">${esc(item.inboxStatus?.attemptCount ?? "—")}</div>
                </div>
                <div class="mini-panel">
                  <div class="meta-label">received_at</div>
                  <div class="mini-value">${esc(pretty(item.inboxStatus?.receivedAt))}</div>
                </div>
                <div class="mini-panel">
                  <div class="meta-label">modified</div>
                  <div class="mini-value">${esc(pretty(item.inboxStatus?.modified))}</div>
                </div>
              </div>
              ${(item.inboxStatus?.lastError || "").trim()
                ? `<div class="scroll-box">${esc(item.inboxStatus.lastError)}</div>`
                : none()}
            </section>

            <section class="section-box">
              <div class="section-title">outbox</div>
              <div class="summary-grid">
                <div class="mini-panel ${tone(item.outbox?.outcome)}">
                  <div class="meta-label">outcome</div>
                  <div class="mini-value">${esc(item.outbox?.outcome ?? "—")}</div>
                </div>
                <div class="mini-panel ${tone(item.outbox?.status)}">
                  <div class="meta-label">status</div>
                  <div class="mini-value">${esc(item.outbox?.status ?? "—")}</div>
                </div>
                <div class="mini-panel">
                  <div class="meta-label">next_retry_at</div>
                  <div class="mini-value">${esc(pretty(item.outbox?.nextRetryAt))}</div>
                </div>
                <div class="mini-panel">
                  <div class="meta-label">modified</div>
                  <div class="mini-value">${esc(pretty(item.outbox?.modified))}</div>
                </div>
              </div>
              ${(item.outbox?.lastError || "").trim()
                ? `<div class="scroll-box">${esc(item.outbox.lastError)}</div>`
                : none()}
            </section>
          </div>

          <section class="section-box steps-box">
            <div class="section-title">steps</div>
            ${item.steps?.length
              ? `<div><!-- step rows --></div>`
              : none()}
          </section>

          <section class="section-box">
            <div class="section-title">outbox_history</div>
            ${history.length ? `
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>attempt_no</th>
                      <th>outcome</th>
                      <th>status</th>
                      <th>created_at</th>
                      <th>error</th>
                    </tr>
                  </thead>
                  <tbody>${historyRows}</tbody>
                </table>
              </div>
            ` : `<div class="empty" style="margin-top:12px;">—</div>`}
          </section>
          </div></div><!-- /event-body-wrap -->
        </article>`;
    }
  </script>
</body>
</html>
